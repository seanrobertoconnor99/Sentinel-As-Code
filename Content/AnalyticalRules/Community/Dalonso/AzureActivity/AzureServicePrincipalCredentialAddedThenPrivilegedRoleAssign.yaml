id: 760470a7-d08e-47d4-a718-79746ff700c5
name: Azure - Service Principal Credential Added Then Privileged Role Assigned (Same Initiator, 60 min)
description: |
  Community rule by David Alonso (https://github.com/davidalonsod/Dalonso-Security-Repo). Licensed under The Unlicense.

  Detects when the same identity first adds a credential to a service principal and then assigns it (or another SP) a privileged role — both within 60 minutes. This is the Azure-native 'create backdoor SP' attack chain (T1098.001) used by groups like Storm-0501 and Midnight Blizzard to establish persistent privileged access. NOT a duplicate of built-in 'First access credential added to Application' rule which only covers the first credential add without the role-escalation correlation. FP mitigations: (1) Role name filtering — only Owner, Contributor, UAA, Global Admin, Privileged Role Admin trigger; (2) 60-minute correlation window keeps false positives low while catching fast-moving attacks; (3) Requires both events to share the same Initiator identity.
severity: High
queryFrequency: PT1H
queryPeriod: PT2H
triggerOperator: gt
triggerThreshold: 0
enabled: true
tactics:
- Persistence
- PrivilegeEscalation
relevantTechniques:
- T1098
query: |
  let CredentialAdditions = AuditLogs
      | where TimeGenerated > ago(2h)
      | where OperationName has_any ("Add service principal credentials", "Update application – Certificates and secrets management")
      | where Result =~ "success"
      | extend SPName = tostring(TargetResources[0].displayName)
      | extend Initiator = coalesce(tostring(InitiatedBy.user.userPrincipalName), tostring(InitiatedBy.app.displayName))
      | where isnotempty(Initiator)
      | project CredTime = TimeGenerated, Initiator, SPName, CorrelationId;
  let PrivilegedRoleAssignments = AuditLogs
      | where TimeGenerated > ago(2h)
      | where OperationName has_any ("Add member to role", "Add app role assignment to service principal", "Add eligible member to role")
      | where Result =~ "success"
      | extend RoleName = tostring(TargetResources[0].displayName)
      | where RoleName has_any ("Owner", "Contributor", "User Access Administrator", "Global Administrator", "Privileged Role Administrator", "Security Administrator", "Application Administrator")
      | extend Initiator = coalesce(tostring(InitiatedBy.user.userPrincipalName), tostring(InitiatedBy.app.displayName))
      | where isnotempty(Initiator)
      | project RoleTime = TimeGenerated, Initiator, RoleName, CorrelationId;
  CredentialAdditions
  | join kind=inner PrivilegedRoleAssignments on Initiator
  | where RoleTime >= CredTime and RoleTime <= CredTime + 1h
  | summarize
      EventCount = count(),
      AssignedRoles = make_set(RoleName, 5),
      AffectedSPs = make_set(SPName, 5),
      CorrelationIds = make_set(CorrelationId, 5),
      FirstEvent = min(CredTime),
      LastEvent = max(RoleTime)
      by Initiator
  | extend
      AccountName = tostring(split(Initiator, "@")[0]),
      AccountUPNSuffix = tostring(split(Initiator, "@")[1])
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: 'Backdoor SP: {{Initiator}} added credential then assigned {{AssignedRoles}}'
  alertDescriptionFormat: '{{Initiator}} added credentials to SP(s) {{AffectedSPs}} and subsequently assigned privileged role(s) {{AssignedRoles}} within 60 minutes.'
customDetails:
  AssignedRoles: AssignedRoles
  AffectedSPs: AffectedSPs
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: PT6H
    matchingMethod: AllEntities
    groupByEntities:
    - Account
    groupByAlertDetails: []
    groupByCustomDetails: []
version: 1.0.0
kind: Scheduled
tags:
- Community
- David Alonso
- Threat Hunting
