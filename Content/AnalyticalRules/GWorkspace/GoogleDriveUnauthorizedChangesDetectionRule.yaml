id: 17bffac0-736d-4daf-beb3-285b396c35b3
name: Google Drive Changes by None Document Owner
description: |
  'This rule looks for changes to a Google Drive file by someone other than the owner of the document.'
severity: Informational
requiredDataConnectors:
- connectorId: YourConnectorId
  dataTypes:
  - YourDataType
queryFrequency: P1D
queryPeriod: P1D
triggerOperator: gt
triggerThreshold: 0
enabled: true
tactics:
- Collection
- Impact
relevantTechniques:
- T1213
- T1565
- T1565.001
query: |
  GWorkspaceActivityReports
  | where ActorKey != "SYSTEM"
  | where EventMessage in (
    "change_owner", "change_user_access", "change_user_access_hierarchy_reconciled"
    , "change_document_access_scope", "change_event", "change_acl_editors", "change_owner"
    , "change_document_visibility", "remove_member", "remove_user", "delete"
    )
      and Owner != ActorEmail
      and Owner contains "contoso.com" // Excludes folders owned by a group
  | project-rename
      ChangeMadeBy=ActorEmail,
      DocumentOwner=Owner,
      AccessChangedForUser=TargetUserName,
      ChangeMade=EventMessage,
      OldAccess=Oldvalue,
      NewAccess=Newvalue,
      DocumentTitle=DocTitle,
      TimeChanged=TimeGenerated
  // Group duplicate audit entries for the same action
  | summarize AccessChangedForUsers = make_set(AccessChangedForUser)
      by ChangeMadeBy
      , DocumentOwner
      , ChangeMade
      , OldAccess
      , NewAccess
      , DocumentTitle
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: ChangeMadeBy
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: DocumentOwner
- entityType: File
  fieldMappings:
  - identifier: Name
    columnName: DocumentTitle
customDetails:
  OldAccess: OldAccess
  NewAccess: NewAccess
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: true
suppressionDuration: P1D
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AnyAlert
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
version: 1.0.0
kind: Scheduled
tags:
- Sentinel-As-Code
- Custom
- Google Workspace
