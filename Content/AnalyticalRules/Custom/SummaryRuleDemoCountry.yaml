id: 58deb816-0939-417f-95f2-05a9dc5d0b2c
name: Summary Rule - Demo Country
description: |
  'Enter rule description here'
severity: Medium
requiredDataConnectors:
- connectorId: YourConnectorId
  dataTypes:
  - YourDataType
queryFrequency: PT5M
queryPeriod: PT10M
triggerOperator: gt
triggerThreshold: 0
enabled: true
tactics:
- CommandAndControl
- Exfiltration
relevantTechniques:
- T1048
- T1071
- T1071.001
query: |
  DockerFlow_CL
  | extend DstIPLocation = geo_info_from_ip_address(dstIp)
  | extend Country = tostring(DstIPLocation.Country)
  | where Country in ("Russia", "China")
entityMappings:
- entityType: IP
  fieldMappings:
  - identifier: Address
    columnName: dstIp
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: false
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
version: 1.0.0
kind: Scheduled
tags:
- Sentinel-As-Code
- Custom
