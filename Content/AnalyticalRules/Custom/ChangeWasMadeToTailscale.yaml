id: 2dedd20f-2951-41b8-9727-1baf4c26a4a7
name: Testing - A change was made to Tailscale
description: |
  'The alert rule was disabled due to too many consecutive failures. Reason: A table referenced in the query was not found. Verify that the relevant data source is connected. A change was made to Tailscale'
severity: Medium
requiredDataConnectors:
- connectorId: YourConnectorId
  dataTypes:
  - YourDataType
queryFrequency: PT1H
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
enabled: true
tactics:
- DefenseEvasion
- Impact
- Persistence
relevantTechniques:
- T1485
- T1562
- T1562.001
- T1562.004
- T1565
- T1565.001
query: |
  TailscaleAudit_CL
  | where Action has_any ("ENABLE", "DISABLE")
  | extend Origin = tolower(replace_string(Origin, '_', ' '))
  , TargetProperty = tolower(replace_string(TargetProperty, '_', ' '))
  | project EventTime, ActorLoginName, Origin, TargetProperty, TargetType
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: ActorLoginName
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: false
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
version: 1.0.0
kind: Scheduled
tags:
- Sentinel-As-Code
- Custom
