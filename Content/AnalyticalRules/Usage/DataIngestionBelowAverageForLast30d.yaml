id: 138b1f92-2d9e-4547-b6ba-9d3738517f1a
name: Data ingestion below average for last 30d
description: |
  'Enter rule description here'
severity: Informational
requiredDataConnectors:
- connectorId: YourConnectorId
  dataTypes:
  - YourDataType
queryFrequency: PT5H
queryPeriod: PT5H
triggerOperator: gt
triggerThreshold: 0
enabled: true
tactics:
- DefenseEvasion
- Impact
query: "let lastWeekStart = ago(14d); \nlet lastWeekEnd = ago(7d); \nlet thirtyDaysStart = ago(30d);\nlet thirtyDaysEnd = ago(0d);\nlet averageIngestionLast30Days = toscalar(\n    Usage\n    | where IsBillable\
  \ == true\n    | where TimeGenerated >= thirtyDaysStart and TimeGenerated < thirtyDaysEnd\n    | summarize avg(Quantity) / toreal(round(1024,-3))\n);\nUsage\n| where IsBillable == true\n| where TimeGenerated\
  \ >= lastWeekStart and TimeGenerated < lastWeekEnd \n| summarize LastWeekSize = sumif(Quantity, isnotempty(DataType)) / round(1024,-3) by DataType \n| extend LastWeekSize = toreal(LastWeekSize)\n| extend\
  \ PercentageBelowAverage = iif(LastWeekSize < averageIngestionLast30Days, round((LastWeekSize / averageIngestionLast30Days) * 100, 2), 0.0)\n| project DataType, LastWeekSize, PercentageBelowAverage\n\
  | where PercentageBelowAverage > 0\n"
entityMappings:
- entityType: CloudApplication
  fieldMappings:
  - identifier: Name
    columnName: DataType
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: true
suppressionDuration: P1D
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: false
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
version: 1.0.0
kind: Scheduled
tags:
- Sentinel-As-Code
- Custom
- Workspace Usage
