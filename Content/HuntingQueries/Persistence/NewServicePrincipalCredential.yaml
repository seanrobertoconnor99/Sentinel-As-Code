id: "a1b2c3d4-e5f6-7890-abcd-123456789abc"
name: "New credential added to service principal"
description: "Detects when a new credential (password or certificate) is added to a service principal, which could indicate persistence by an attacker."
query: |
  AuditLogs
  | where TimeGenerated > ago(1d)
  | where OperationName has_any ("Add service principal credentials", "Update application – Certificates and secrets management")
  | where Result == "success"
  | extend InitiatedBy = tostring(InitiatedBy.user.userPrincipalName)
  | extend TargetApp = tostring(TargetResources[0].displayName)
  | extend TargetAppId = tostring(TargetResources[0].id)
  | project TimeGenerated, InitiatedBy, OperationName, TargetApp, TargetAppId, CorrelationId
tactics:
  - Persistence
techniques:
  - T1098.001
