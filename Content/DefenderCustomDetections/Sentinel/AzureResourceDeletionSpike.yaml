displayName: Spike in Azure resource deletions
isEnabled: true
queryCondition:
  queryText: |
    AzureActivity
    | where TimeGenerated > ago(1h)
    | where OperationNameValue endswith "delete"
    | where ActivityStatusValue == "Success"
    | extend AccountUpn = Caller
    | where AccountUpn contains "@"
    | summarize DeletionCount = count(),
        ResourceTypes = make_set(ResourceProviderValue, 10),
        ResourceGroups = make_set(ResourceGroup, 10),
        TimeGenerated = max(TimeGenerated)
        by AccountUpn, SubscriptionId
    | where DeletionCount > 10
    | project TimeGenerated, AccountUpn, SubscriptionId,
              DeletionCount, ResourceTypes, ResourceGroups
  lastModifiedDateTime: "2026-03-23T00:00:00Z"
schedule:
  period: "1H"
detectionAction:
  alertTemplate:
    title: "Spike in Azure resource deletions"
    description: |
      A user account deleted more than 10 Azure resources within one hour.
      Mass resource deletion can indicate a compromised account performing
      destructive actions or an insider threat destroying cloud infrastructure.
    severity: high
    category: Impact
    mitreTechniques:
      - T1485
    recommendedActions: |
      1. Verify with the account owner whether the deletions were planned.
      2. Check if the deletions align with a decommissioning or migration project.
      3. Review the types of resources deleted for business impact.
      4. If unauthorised, lock the account and revoke Azure RBAC permissions.
      5. Assess recovery options via Azure resource locks and soft-delete retention.
      6. Review Activity Log for the subscription around the deletion timeframe.
    impactedAssets:
      - "@odata.type": "#microsoft.graph.security.impactedUserAsset"
        identifier: accountUpn
