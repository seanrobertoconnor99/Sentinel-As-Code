displayName: New credential added to service principal or application
isEnabled: true
queryCondition:
  queryText: |
    AuditLogs
    | where TimeGenerated > ago(1h)
    | where OperationName has_any ("Add service principal credentials",
        "Update application - Certificates and secrets management")
    | extend AccountUpn = tostring(InitiatedBy.user.userPrincipalName)
    | extend AccountObjectId = tostring(InitiatedBy.user.id)
    | extend TargetApp = tostring(TargetResources[0].displayName)
    | extend TargetAppId = tostring(TargetResources[0].id)
    | extend ModifiedProperties = tostring(TargetResources[0].modifiedProperties)
    | where isnotempty(AccountUpn)
    | project TimeGenerated, AccountUpn, AccountObjectId,
              TargetApp, TargetAppId, OperationName,
              ModifiedProperties, CorrelationId
  lastModifiedDateTime: "2026-03-23T00:00:00Z"
schedule:
  period: "1H"
detectionAction:
  alertTemplate:
    title: "New credential added to service principal or application"
    description: |
      A user added a new credential (certificate or secret) to a service
      principal or application registration. Attackers add credentials to
      existing applications to gain persistent access that survives password
      resets and MFA enforcement.
    severity: high
    category: Persistence
    mitreTechniques:
      - T1098.001
    recommendedActions: |
      1. Verify with the account owner whether the credential addition was planned.
      2. Review the target application permissions and scope.
      3. Check if the application has privileged API permissions (e.g., Mail.Read, Directory.ReadWrite.All).
      4. If unauthorised, remove the added credential immediately.
      5. Review the initiating account for compromise indicators.
      6. Audit all recent changes to application registrations.
    impactedAssets:
      - "@odata.type": "#microsoft.graph.security.impactedUserAsset"
        identifier: accountObjectId
