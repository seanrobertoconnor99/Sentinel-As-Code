displayName: Privileged account logon from previously unseen device
isEnabled: true
queryCondition:
  queryText: |
    let PrivilegedAccounts = IdentityDirectoryEvents
    | where Timestamp > ago(30d)
    | where ActionType == "Group Membership changed"
    | where AdditionalFields has_any ("Domain Admins", "Enterprise Admins",
        "Schema Admins", "Administrators")
    | distinct TargetAccountUpn;
    let KnownDevices = IdentityLogonEvents
    | where Timestamp between (ago(30d) .. ago(1h))
    | where AccountUpn in (PrivilegedAccounts)
    | where ActionType == "LogonSuccess"
    | distinct AccountUpn, DeviceName;
    IdentityLogonEvents
    | where Timestamp > ago(1h)
    | where ActionType == "LogonSuccess"
    | where AccountUpn in (PrivilegedAccounts)
    | join kind=leftanti KnownDevices on AccountUpn, DeviceName
    | project Timestamp, ReportId, AccountUpn, AccountObjectId,
              AccountSid, DeviceName, IPAddress, Application
  lastModifiedDateTime: "2026-03-23T00:00:00Z"
schedule:
  period: "1H"
detectionAction:
  alertTemplate:
    title: "Privileged account logon from previously unseen device"
    description: |
      A privileged account (Domain Admin, Enterprise Admin, or Schema Admin)
      successfully authenticated from a device not seen in the previous 30 days.
      This may indicate credential theft or unauthorised use of admin credentials.
    severity: high
    category: PrivilegeEscalation
    mitreTechniques:
      - T1078.002
    recommendedActions: |
      1. Verify with the account owner whether the logon was expected.
      2. Check the device for compliance status and recent activity.
      3. Review the logon source IP and location for anomalies.
      4. If unauthorised, force password reset and revoke sessions.
      5. Check for subsequent privileged actions from this session.
    impactedAssets:
      - "@odata.type": "#microsoft.graph.security.impactedUserAsset"
        identifier: accountObjectId
  responseActions:
    - "@odata.type": "#microsoft.graph.security.markUserAsCompromisedResponseAction"
      identifier: accountObjectId
