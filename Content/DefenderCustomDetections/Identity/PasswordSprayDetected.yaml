displayName: Password spray with subsequent successful logon
isEnabled: true
queryCondition:
  queryText: |
    let SprayIPs = IdentityLogonEvents
    | where Timestamp > ago(1h)
    | where ActionType == "LogonFailed"
    | summarize TargetAccountCount = dcount(AccountUpn),
        FailedAttempts = count()
        by IPAddress
    | where TargetAccountCount > 10
    | where FailedAttempts > 20
    | project IPAddress;
    IdentityLogonEvents
    | where Timestamp > ago(1h)
    | where ActionType == "LogonSuccess"
    | where IPAddress in (SprayIPs)
    | project Timestamp, ReportId, AccountUpn, AccountObjectId,
              AccountSid, IPAddress, Application, DeviceName
  lastModifiedDateTime: "2026-03-23T00:00:00Z"
schedule:
  period: "1H"
detectionAction:
  alertTemplate:
    title: "Password spray with subsequent successful logon"
    description: |
      An IP address that attempted to authenticate against more than 10
      different accounts subsequently achieved a successful logon. This
      indicates a password spray attack that compromised at least one account.
    severity: high
    category: CredentialAccess
    mitreTechniques:
      - T1110.003
    recommendedActions: |
      1. Force password reset for the successfully authenticated account.
      2. Revoke all active sessions for the compromised account.
      3. Block the source IP address at Conditional Access.
      4. Check for post-compromise activity from the account.
      5. Review other accounts that failed from the same IP.
      6. Enable number matching MFA if not already enforced.
    impactedAssets:
      - "@odata.type": "#microsoft.graph.security.impactedUserAsset"
        identifier: accountObjectId
  responseActions:
    - "@odata.type": "#microsoft.graph.security.forceUserPasswordResetResponseAction"
      identifier: accountSid
    - "@odata.type": "#microsoft.graph.security.markUserAsCompromisedResponseAction"
      identifier: accountObjectId
