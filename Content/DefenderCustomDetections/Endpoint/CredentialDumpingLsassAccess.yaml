displayName: Credential dumping via LSASS memory access
isEnabled: true
queryCondition:
  queryText: |
    DeviceProcessEvents
    | where Timestamp > ago(1h)
    | where FileName in~ ("procdump.exe", "procdump64.exe", "mimikatz.exe",
        "nanodump.exe", "ppldump.exe")
        or (ProcessCommandLine has "lsass" and ProcessCommandLine has_any ("dump", "minidump", "sekurlsa"))
        or (FileName == "rundll32.exe" and ProcessCommandLine has "comsvcs.dll" and ProcessCommandLine has "MiniDump")
    | project Timestamp, DeviceId, DeviceName, ReportId,
              AccountUpn = InitiatingProcessAccountUpn,
              AccountSid = InitiatingProcessAccountSid,
              FileName, ProcessCommandLine, FolderPath,
              InitiatingProcessFileName, InitiatingProcessCommandLine,
              InitiatingProcessSHA1
  lastModifiedDateTime: "2026-03-23T00:00:00Z"
schedule:
  period: "1H"
detectionAction:
  alertTemplate:
    title: "Credential dumping via LSASS memory access"
    description: |
      A process attempted to access or dump LSASS memory on an endpoint.
      LSASS stores credentials for interactive sessions and is a primary
      target for credential theft tools like Mimikatz and ProcDump.
    severity: high
    category: CredentialAccess
    mitreTechniques:
      - T1003.001
    recommendedActions: |
      1. Isolate the device immediately to prevent lateral movement.
      2. Identify the process and verify if it is an authorised admin tool.
      3. Check the process hash against threat intelligence feeds.
      4. Review recent logon events for the account that ran the process.
      5. Scan the device for additional credential theft indicators.
      6. Reset credentials for any accounts that were logged on to the device.
    impactedAssets:
      - "@odata.type": "#microsoft.graph.security.impactedDeviceAsset"
        identifier: deviceId
  responseActions:
    - "@odata.type": "#microsoft.graph.security.isolateDeviceResponseAction"
      identifier: deviceId
      isolationType: full
    - "@odata.type": "#microsoft.graph.security.collectInvestigationPackageResponseAction"
      identifier: deviceId
    - "@odata.type": "#microsoft.graph.security.runAntivirusScanResponseAction"
      identifier: deviceId
