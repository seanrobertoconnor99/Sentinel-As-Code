# ---------------------------------------------------------------------------
# Azure DevOps Pipeline: Deploy Microsoft Sentinel Infrastructure & Content
# ---------------------------------------------------------------------------
# This pipeline provisions Sentinel infrastructure via Bicep (if needed) and
# then deploys Content Hub solutions and their associated content (Analytics
# Rules, Workbooks, Automation Rules, Hunting Queries) to the workspace.
#
# Prerequisites:
#   - Azure Service Connection with Contributor + Microsoft Sentinel Contributor
#     roles on the target Subscription / Resource Group
#   - Az.Accounts PowerShell module (installed in pipeline)
#
# Usage:
#   Trigger manually or via schedule. Override parameters at queue time
#   to target specific solutions or toggle content switches.
# ---------------------------------------------------------------------------

trigger: none

schedules:
  - cron: "0 4 * * 1"
    displayName: "Weekly Monday 04:00 UTC"
    branches:
      include:
        - main
    always: false

parameters:
  # ── Stage Toggles ──────────────────────────────────────────────────────
  - name: deployInfrastructure
    displayName: "── Stage 1-2: Deploy Infrastructure (Bicep)"
    type: boolean
    default: true

  - name: deployContentHub
    displayName: "── Stage 3: Deploy Content Hub Solutions"
    type: boolean
    default: true

  - name: deployCustomContent
    displayName: "── Stage 4: Deploy Custom Content"
    type: boolean
    default: true

  - name: deployDefenderDetections
    displayName: "── Stage 5: Deploy Defender XDR Custom Detections"
    type: boolean
    default: true

  # ── Infrastructure (Stage 2) ───────────────────────────────────────────
  - name: dailyQuota
    displayName: "  Bicep › Daily Quota (GB, 0 = unlimited)"
    type: number
    default: 0

  - name: retentionInDays
    displayName: "  Bicep › Interactive Retention (days, 30-730)"
    type: number
    default: 90

  - name: totalRetentionInDays
    displayName: "  Bicep › Total Retention incl. Archive (0 = same as interactive)"
    type: number
    default: 0

  # ── Content Hub (Stage 3) ──────────────────────────────────────────────
  - name: solutions
    displayName: "  Content Hub › Solutions (comma-separated)"
    type: string
    default: "Analytics Health & Audit,Azure Activity,Azure DevOps Auditing,Azure Key Vault,Azure Logic Apps,Azure Network Security Groups,Azure Resource Graph,Azure Storage,Common Event Format,Data Collection Rule Toolkit,Microsoft 365,Microsoft Defender for Cloud,Microsoft Defender for Cloud Apps,Microsoft Defender for Endpoint,Microsoft Defender for Identity,Microsoft Defender Threat Intelligence,Microsoft Defender XDR,Microsoft Entra ID,Microsoft Sentinel Optimization Workbook,SOC Handbook,Summary Rules Workbook,Syslog,Threat Intelligence (NEW),Windows Security Events,Windows Server DNS,Workspace Usage Report"

  - name: severitiesToInclude
    displayName: "  Content Hub › Analytics Rule Severities"
    type: string
    default: "High,Medium,Low,Informational"

  - name: disableRules
    displayName: "  Content Hub › Deploy Analytics Rules as Disabled"
    type: boolean
    default: true

  - name: protectCustomisedRules
    displayName: "  Content Hub › Protect Customised Rules from Overwrite"
    type: boolean
    default: true

  - name: skipAnalyticsRules
    displayName: "  Content Hub › Skip Analytics Rules"
    type: boolean
    default: false

  - name: skipWorkbooks
    displayName: "  Content Hub › Skip Workbooks"
    type: boolean
    default: false

  - name: skipAutomationRules
    displayName: "  Content Hub › Skip Automation Rules"
    type: boolean
    default: false

  - name: skipHuntingQueries
    displayName: "  Content Hub › Skip Hunting Queries"
    type: boolean
    default: false

  - name: forceSolutionUpdate
    displayName: "  Content Hub › Force Solution Update (even if current)"
    type: boolean
    default: false

  - name: forceContentDeployment
    displayName: "  Content Hub › Force Content Redeployment (even if current)"
    type: boolean
    default: false

  # ── Custom Content (Stage 4) ───────────────────────────────────────────
  - name: skipCustomParsers
    displayName: "  Custom › Skip Parsers (YAML)"
    type: boolean
    default: false

  - name: skipCustomDetections
    displayName: "  Custom › Skip Detections (YAML)"
    type: boolean
    default: false

  - name: skipCommunityDetections
    displayName: "  Custom > Skip Community Detections (Dalonso)"
    type: boolean
    default: true

  - name: skipCustomWatchlists
    displayName: "  Custom › Skip Watchlists (JSON+CSV)"
    type: boolean
    default: false

  - name: skipCustomPlaybooks
    displayName: "  Custom › Skip Playbooks (ARM)"
    type: boolean
    default: false

  - name: skipCustomWorkbooks
    displayName: "  Custom › Skip Workbooks (Gallery JSON)"
    type: boolean
    default: false

  - name: skipCustomHuntingQueries
    displayName: "  Custom › Skip Hunting Queries (YAML)"
    type: boolean
    default: false

  - name: skipCustomAutomationRules
    displayName: "  Custom › Skip Automation Rules (JSON)"
    type: boolean
    default: false

  - name: skipCustomSummaryRules
    displayName: "  Custom › Skip Summary Rules (JSON)"
    type: boolean
    default: false

  - name: smartDeployment
    displayName: "  Custom › Smart Deployment (only deploy changed files)"
    type: boolean
    default: true

  # ── General ────────────────────────────────────────────────────────────
  - name: whatIf
    displayName: "🔍 Dry Run — preview changes without applying"
    type: boolean
    default: true

variables:
  - group: sentinel-deployment      # Variable group containing:
                                     #   - azureSubscriptionId
                                     #   - sentinelResourceGroup
                                     #   - sentinelWorkspaceName
                                     #   - sentinelRegion
                                     #   - playbookResourceGroup (optional, defaults to sentinelResourceGroup)
  - name: serviceConnection
    value: "sc-sentinel-as-code"
  - name: SuppressAzurePowerShellBreakingChangeWarnings
    value: "true"

  # Map boolean parameters to switch flag strings at compile time.
  # Each resolves to either the switch name or an empty string.
  - name: flagDisableRules
    ${{ if eq(parameters.disableRules, true) }}:
      value: "-DisableRules"
    ${{ else }}:
      value: ""

  - name: flagProtectCustomisedRules
    ${{ if eq(parameters.protectCustomisedRules, true) }}:
      value: "-ProtectCustomisedRules"
    ${{ else }}:
      value: ""

  - name: flagSkipAnalyticsRules
    ${{ if eq(parameters.skipAnalyticsRules, true) }}:
      value: "-SkipAnalyticsRules"
    ${{ else }}:
      value: ""

  - name: flagSkipWorkbooks
    ${{ if eq(parameters.skipWorkbooks, true) }}:
      value: "-SkipWorkbooks"
    ${{ else }}:
      value: ""

  - name: flagSkipAutomationRules
    ${{ if eq(parameters.skipAutomationRules, true) }}:
      value: "-SkipAutomationRules"
    ${{ else }}:
      value: ""

  - name: flagSkipHuntingQueries
    ${{ if eq(parameters.skipHuntingQueries, true) }}:
      value: "-SkipHuntingQueries"
    ${{ else }}:
      value: ""

  - name: flagForceSolutionUpdate
    ${{ if eq(parameters.forceSolutionUpdate, true) }}:
      value: "-ForceSolutionUpdate"
    ${{ else }}:
      value: ""

  - name: flagForceContentDeployment
    ${{ if eq(parameters.forceContentDeployment, true) }}:
      value: "-ForceContentDeployment"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomParsers
    ${{ if eq(parameters.skipCustomParsers, true) }}:
      value: "-SkipParsers"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomDetections
    ${{ if eq(parameters.skipCustomDetections, true) }}:
      value: "-SkipDetections"
    ${{ else }}:
      value: ""

  - name: flagSkipCommunityDetections
    ${{ if eq(parameters.skipCommunityDetections, true) }}:
      value: "-SkipCommunityDetections"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomWatchlists
    ${{ if eq(parameters.skipCustomWatchlists, true) }}:
      value: "-SkipWatchlists"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomPlaybooks
    ${{ if eq(parameters.skipCustomPlaybooks, true) }}:
      value: "-SkipPlaybooks"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomWorkbooks
    ${{ if eq(parameters.skipCustomWorkbooks, true) }}:
      value: "-SkipWorkbooks"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomHuntingQueries
    ${{ if eq(parameters.skipCustomHuntingQueries, true) }}:
      value: "-SkipHuntingQueries"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomAutomationRules
    ${{ if eq(parameters.skipCustomAutomationRules, true) }}:
      value: "-SkipAutomationRules"
    ${{ else }}:
      value: ""

  - name: flagSkipCustomSummaryRules
    ${{ if eq(parameters.skipCustomSummaryRules, true) }}:
      value: "-SkipSummaryRules"
    ${{ else }}:
      value: ""

  - name: flagSmartDeployment
    ${{ if eq(parameters.smartDeployment, true) }}:
      value: "-SmartDeployment"
    ${{ else }}:
      value: ""

  - name: flagWhatIf
    ${{ if eq(parameters.whatIf, true) }}:
      value: "-WhatIf"
    ${{ else }}:
      value: ""

stages:
  # =================================================================================
  # Stage 1: Check Existing Resources
  # Checks whether the Resource Group and Log Analytics Workspace already exist.
  # Handles the case where the RG doesn't exist yet (greenfield deployment).
  # If resources are found, the Bicep deployment stage is skipped.
  # =================================================================================
  - stage: CheckInfrastructure
    displayName: "Check Existing Infrastructure"
    condition: and(succeeded(), eq('${{ parameters.deployInfrastructure }}', 'True'))
    jobs:
      - job: CheckResources
        displayName: "Verify Existing Sentinel Resources"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzurePowerShell@5
            displayName: "Check for Existing Log Analytics Workspace"
            name: CheckSentinelResources
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: "InlineScript"
              pwsh: true
              azurePowerShellVersion: LatestVersion
              Inline: |
                Write-Host "##[section]Checking for existing Sentinel infrastructure"
                Write-Host "Resource Group: $(sentinelResourceGroup)"
                Write-Host "Workspace: $(sentinelWorkspaceName)"

                $resourcesExist = "false"
                $bicepNeeded = $false

                # Check Sentinel Resource Group
                $rg = Get-AzResourceGroup -Name "$(sentinelResourceGroup)" -ErrorAction SilentlyContinue
                if (-not $rg) {
                    Write-Host "Resource Group '$(sentinelResourceGroup)' not found — Bicep deployment required."
                    $bicepNeeded = $true
                } else {
                    Write-Host "Resource Group '$(sentinelResourceGroup)' exists."

                    # Check Log Analytics Workspace
                    $law = Get-AzOperationalInsightsWorkspace `
                        -ResourceGroupName "$(sentinelResourceGroup)" `
                        -Name "$(sentinelWorkspaceName)" `
                        -ErrorAction SilentlyContinue

                    if ($law) {
                        Write-Host "Log Analytics Workspace '$(sentinelWorkspaceName)' exists."
                    } else {
                        Write-Host "Log Analytics Workspace '$(sentinelWorkspaceName)' not found — Bicep deployment required."
                        $bicepNeeded = $true
                    }
                }

                # Check optional Playbook Resource Group
                # ADO leaves unset variables as the literal '$(varName)' — treat that as empty
                $playbookRG = "$(playbookResourceGroup)"
                if ($playbookRG -like '`$(*') { $playbookRG = '' }
                if ($playbookRG -and $playbookRG -ne "$(sentinelResourceGroup)") {
                    $pRg = Get-AzResourceGroup -Name $playbookRG -ErrorAction SilentlyContinue
                    if (-not $pRg) {
                        Write-Host "Playbook Resource Group '$playbookRG' not found — Bicep deployment required."
                        $bicepNeeded = $true
                    } else {
                        Write-Host "Playbook Resource Group '$playbookRG' exists."
                    }
                }

                if (-not $bicepNeeded) {
                    Write-Host "All required resources exist — skipping Bicep deployment."
                    $resourcesExist = "true"
                }

                echo "##vso[task.setvariable variable=RESOURCES_EXIST;isOutput=true]$resourcesExist"

  # =================================================================================
  # Stage 2: Deploy Infrastructure (Bicep)
  # Registers required resource providers, then provisions the Resource Group,
  # Log Analytics Workspace, Sentinel, Entity Analytics, and UEBA.
  # Skipped if the workspace already exists or if deployInfrastructure is false.
  # =================================================================================
  - stage: DeployInfrastructure
    displayName: "Deploy Sentinel Infrastructure (Bicep)"
    dependsOn: CheckInfrastructure
    condition: |
      and(
        succeeded(),
        eq('${{ parameters.deployInfrastructure }}', 'True'),
        eq(dependencies.CheckInfrastructure.outputs['CheckResources.CheckSentinelResources.RESOURCES_EXIST'], 'false')
      )
    jobs:
      - job: DeployBicep
        displayName: "Deploy Bicep Templates"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Register Required Resource Providers"
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "##[section]Registering required resource providers"
                az provider register --namespace Microsoft.OperationsManagement --wait
                az provider register --namespace Microsoft.SecurityInsights --wait
                echo "Resource providers registered successfully."

          - task: AzureCLI@2
            displayName: "Deploy Sentinel Infrastructure with Bicep"
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "##[section]Starting Bicep Deployment"
                echo "Region: $(sentinelRegion)"
                echo "Resource Group: $(sentinelResourceGroup)"
                echo "Workspace: $(sentinelWorkspaceName)"
                echo "Daily Quota: ${{ parameters.dailyQuota }} GB"
                echo "Retention: ${{ parameters.retentionInDays }} days (interactive), ${{ parameters.totalRetentionInDays }} days (total)"

                # Build base Bicep parameters
                PARAMS="rgLocation=$(sentinelRegion) rgName=$(sentinelResourceGroup) lawName=$(sentinelWorkspaceName) dailyQuota=${{ parameters.dailyQuota }} retentionInDays=${{ parameters.retentionInDays }} totalRetentionInDays=${{ parameters.totalRetentionInDays }}"

                # Add optional playbook RG if set and different from Sentinel RG
                # ADO leaves unset variables as the literal '$(varName)' — treat that as empty
                PLAYBOOK_RG="$(playbookResourceGroup)"
                if [[ "$PLAYBOOK_RG" == \$\(* ]]; then PLAYBOOK_RG=""; fi
                if [ -n "$PLAYBOOK_RG" ] && [ "$PLAYBOOK_RG" != "$(sentinelResourceGroup)" ]; then
                  echo "Including playbook resource group: $PLAYBOOK_RG"
                  PARAMS="$PARAMS playbookRgName=$PLAYBOOK_RG"
                fi

                az deployment sub create \
                  --location "$(sentinelRegion)" \
                  --template-file Bicep/main.bicep \
                  --parameters $PARAMS

          - task: PowerShell@2
            displayName: "Wait for Workspace Indexing"
            inputs:
              targetType: "inline"
              pwsh: true
              script: |
                Write-Host "##[section]Waiting 60 seconds for Log Analytics workspace to become queryable..."
                Start-Sleep -Seconds 60
                Write-Host "Done."

          - task: AzurePowerShell@5
            displayName: "Configure Sentinel Settings"
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: "InlineScript"
              Inline: |
                $token = (Get-AzAccessToken -ResourceUrl "https://management.azure.com" -WarningAction SilentlyContinue)
                if ($token.Token -is [System.Security.SecureString]) {
                    $accessToken = $token.Token | ConvertFrom-SecureString -AsPlainText
                } else {
                    $accessToken = $token.Token
                }
                $headers = @{
                    Authorization  = "Bearer $accessToken"
                    'Content-Type' = 'application/json'
                }
                $baseUri = "https://management.azure.com/subscriptions/$(azureSubscriptionId)/resourceGroups/$(sentinelResourceGroup)/providers/Microsoft.OperationalInsights/workspaces/$(sentinelWorkspaceName)"
                $api = "api-version=2024-01-01-preview"

                $settings = @(
                    @{ name = 'Anomalies';       body = @{ kind = 'Anomalies';       etag = $null; properties = @{} } }
                    @{ name = 'EyesOn';          body = @{ kind = 'EyesOn';          etag = $null; properties = @{} } }
                    @{ name = 'EntityAnalytics'; body = @{ kind = 'EntityAnalytics'; etag = $null; properties = @{ entityProviders = @('AzureActiveDirectory') } } }
                    @{ name = 'Ueba';            body = @{ kind = 'Ueba';            etag = $null; properties = @{ dataSources = @('AuditLogs','AzureActivity','SigninLogs','SecurityEvent') } } }
                )

                foreach ($s in $settings) {
                    $uri = "$baseUri/providers/Microsoft.SecurityInsights/settings/$($s.name)?$api"
                    # GET current setting to retrieve etag
                    try {
                        $getHeaders = @{ Authorization = "Bearer $accessToken" }
                        $current = Invoke-RestMethod -Uri $uri -Method Get -Headers $getHeaders
                        if ($current.etag) { $s.body['etag'] = $current.etag }
                    } catch {}

                    $json = $s.body | ConvertTo-Json -Depth 5

                    $putHeaders = @{
                        Authorization  = "Bearer $accessToken"
                        'Content-Type' = 'application/json'
                        'If-Match'     = if ($s.body.etag) { $s.body.etag } else { '*' }
                    }

                    try {
                        Invoke-RestMethod -Uri $uri -Method Put -Headers $putHeaders -Body $json | Out-Null
                        Write-Host "Configured: $($s.name)"
                    }
                    catch {
                        $errorBody = $null
                        if ($_.Exception.Response) {
                            try {
                                $stream = $_.Exception.Response.GetResponseStream()
                                $reader = [System.IO.StreamReader]::new($stream)
                                $errorBody = $reader.ReadToEnd()
                                $reader.Close()
                            } catch {}
                        }
                        if ($errorBody) {
                            Write-Host "##[warning]Failed to configure $($s.name): $($_.Exception.Message) — $errorBody"
                        } else {
                            Write-Host "##[warning]Failed to configure $($s.name): $($_.Exception.Message)"
                        }
                    }
                }
              azurePowerShellVersion: "LatestVersion"
              pwsh: true

  # =================================================================================
  # Stage 3: Deploy Content Hub
  # Deploys Content Hub solutions and their associated content. Runs regardless of
  # whether infrastructure was deployed or already existed.
  # =================================================================================
  - stage: DeployContentHub
    displayName: "Deploy Sentinel Content Hub"
    dependsOn:
      - CheckInfrastructure
      - DeployInfrastructure
    condition: |
      and(
        eq('${{ parameters.deployContentHub }}', 'True'),
        or(
          eq('${{ parameters.deployInfrastructure }}', 'False'),
          in(dependencies.DeployInfrastructure.result, 'Succeeded', 'Skipped')
        )
      )
    jobs:
      - job: DeployContent
        displayName: "Deploy Solutions and Content"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 120
        steps:
          - checkout: self

          - task: AzurePowerShell@5
            displayName: "Deploy Content Hub Solutions"
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: "InlineScript"
              Inline: |
                # Build the solution and severity arrays from comma-separated parameters
                $solutionList = "${{ parameters.solutions }}" -split ',' | ForEach-Object { $_.Trim() }
                $severityList = "${{ parameters.severitiesToInclude }}" -split ',' | ForEach-Object { $_.Trim() }

                # Build the base parameter hashtable (splatting)
                $scriptParams = @{
                    SubscriptionId      = "$(azureSubscriptionId)"
                    ResourceGroup       = "$(sentinelResourceGroup)"
                    Workspace           = "$(sentinelWorkspaceName)"
                    Region              = "$(sentinelRegion)"
                    Solutions           = $solutionList
                    SeveritiesToInclude = $severityList
                }

                # Conditionally add switch parameters based on compile-time flag variables.
                # Each flag variable is either the switch name (truthy) or empty string (falsy).
                if ("$(flagDisableRules)")            { $scriptParams['DisableRules']            = $true }
                if ("$(flagProtectCustomisedRules)")   { $scriptParams['ProtectCustomisedRules']   = $true }
                if ("$(flagSkipAnalyticsRules)")       { $scriptParams['SkipAnalyticsRules']       = $true }
                if ("$(flagSkipWorkbooks)")            { $scriptParams['SkipWorkbooks']            = $true }
                if ("$(flagSkipAutomationRules)")      { $scriptParams['SkipAutomationRules']      = $true }
                if ("$(flagSkipHuntingQueries)")       { $scriptParams['SkipHuntingQueries']       = $true }
                if ("$(flagForceSolutionUpdate)")      { $scriptParams['ForceSolutionUpdate']      = $true }
                if ("$(flagForceContentDeployment)")   { $scriptParams['ForceContentDeployment']   = $true }
                if ("$(flagWhatIf)")                   { $scriptParams['WhatIf']                   = $true }

                Write-Host "##[section]Launching Sentinel Content Hub Deployment"
                Write-Host "Solutions: $($solutionList -join ', ')"
                Write-Host "Switches: $(($scriptParams.Keys | Where-Object { $scriptParams[$_] -eq $true }) -join ', ')"

                & "$(Build.SourcesDirectory)/Scripts/Deploy-SentinelContentHub.ps1" @scriptParams
              azurePowerShellVersion: "LatestVersion"
              pwsh: true
              errorActionPreference: "Continue"

  # =================================================================================
  # Stage 4: Deploy Custom Content
  # Deploys custom Parsers (YAML), AnalyticalRules (YAML), Watchlists (JSON+CSV),
  # Playbooks (ARM), Workbooks (gallery JSON), Hunting Queries (YAML),
  # Automation Rules (JSON), and Summary Rules (JSON) from the repo to the
  # Sentinel workspace. Uses dependencies.json for prerequisite validation.
  # =================================================================================
  - stage: DeployCustomContent
    displayName: "Deploy Custom Content"
    dependsOn:
      - CheckInfrastructure
      - DeployInfrastructure
      - DeployContentHub
    condition: |
      and(
        eq('${{ parameters.deployCustomContent }}', 'True'),
        or(
          eq('${{ parameters.deployInfrastructure }}', 'False'),
          in(dependencies.DeployContentHub.result, 'Succeeded', 'Skipped')
        )
      )
    jobs:
      - job: DeployCustom
        displayName: "Deploy Custom Sentinel Content"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 2   # Smart deployment needs parent commit for git diff

          - task: DownloadPipelineArtifact@2
            displayName: "Restore Deployment State"
            condition: succeeded()
            continueOnError: true
            inputs:
              buildType: "specific"
              project: "$(System.TeamProjectId)"
              definition: "$(System.DefinitionId)"
              buildVersionToDownload: "latestFromBranch"
              branchName: "$(Build.SourceBranch)"
              allowPartiallySucceededBuilds: true
              allowFailedBuilds: true
              artifactName: "deployment-state"
              targetPath: "$(Build.SourcesDirectory)"

          - task: PowerShell@2
            displayName: "Install powershell-yaml Module"
            inputs:
              targetType: "inline"
              pwsh: true
              script: |
                Write-Host "##[section]Installing powershell-yaml module"
                Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber
                Write-Host "powershell-yaml installed successfully."

          # Pre-deploy guard: dependencies.json must match what discovery
          # produces from current content. The PR-validation gate already
          # checks this on every PR to main, but a scheduled deploy could
          # still race a non-deploy commit (e.g. a doc-only change that
          # adjusts a rule's query inline) that bypassed the gate. Failing
          # fast here is cheap and prevents the deployer from running
          # against a stale dependency graph.
          - task: PowerShell@2
            displayName: "Verify dependency manifest is current"
            inputs:
              targetType: "inline"
              pwsh: true
              script: |
                & "$(Build.SourcesDirectory)/Scripts/Build-DependencyManifest.ps1" -Mode Verify -RepoPath "$(Build.SourcesDirectory)"
                if ($LASTEXITCODE -ne 0) {
                    Write-Host "##vso[task.logissue type=error]dependencies.json is out of sync. Refusing to deploy with a stale dependency graph."
                    Write-Host "##vso[task.logissue type=error]Fix: run ./Scripts/Build-DependencyManifest.ps1 -Mode Generate, commit, then re-run this pipeline."
                    exit 1
                }

          - task: AzurePowerShell@5
            displayName: "Deploy Custom Content"
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: "InlineScript"
              Inline: |
                $scriptParams = @{
                    SubscriptionId = "$(azureSubscriptionId)"
                    ResourceGroup  = "$(sentinelResourceGroup)"
                    Workspace      = "$(sentinelWorkspaceName)"
                    Region         = "$(sentinelRegion)"
                    BasePath       = "$(Build.SourcesDirectory)"
                }

                # ADO leaves unset variables as the literal '$(varName)' — treat that as empty
                $playbookRG = "$(playbookResourceGroup)"
                if ($playbookRG -like '`$(*') { $playbookRG = '' }
                if ($playbookRG) { $scriptParams['PlaybookResourceGroup'] = $playbookRG }

                if ("$(flagSkipCustomParsers)")           { $scriptParams['SkipParsers']         = $true }
                if ("$(flagSkipCustomDetections)")       { $scriptParams['SkipDetections']      = $true }
                if ("$(flagSkipCommunityDetections)")    { $scriptParams['SkipCommunityDetections'] = $true }
                if ("$(flagSkipCustomWatchlists)")      { $scriptParams['SkipWatchlists']     = $true }
                if ("$(flagSkipCustomPlaybooks)")       { $scriptParams['SkipPlaybooks']      = $true }
                if ("$(flagSkipCustomWorkbooks)")       { $scriptParams['SkipWorkbooks']      = $true }
                if ("$(flagSkipCustomHuntingQueries)")  { $scriptParams['SkipHuntingQueries'] = $true }
                if ("$(flagSkipCustomAutomationRules)") { $scriptParams['SkipAutomationRules']= $true }
                if ("$(flagSkipCustomSummaryRules)")    { $scriptParams['SkipSummaryRules']   = $true }
                if ("$(flagSmartDeployment)")           { $scriptParams['SmartDeployment']    = $true }
                if ("$(flagWhatIf)")                    { $scriptParams['WhatIf']             = $true }

                Write-Host "##[section]Launching Custom Content Deployment"
                Write-Host "Switches: $(($scriptParams.Keys | Where-Object { $scriptParams[$_] -eq $true }) -join ', ')"

                & "$(Build.SourcesDirectory)/Scripts/Deploy-CustomContent.ps1" @scriptParams
              azurePowerShellVersion: "LatestVersion"
              pwsh: true
              errorActionPreference: "Continue"

          - task: PublishPipelineArtifact@1
            displayName: "Save Deployment State"
            condition: always()
            continueOnError: true
            inputs:
              targetPath: "$(Build.SourcesDirectory)/deployment-state.json"
              artifactName: "deployment-state"

  # =================================================================================
  # Stage 5: Deploy Defender XDR Custom Detections
  # Deploys custom detection rules to the Microsoft Defender XDR platform via the
  # Microsoft Graph Security API. Rules are defined as YAML files in DefenderCustomDetections/.
  # Requires CustomDetection.ReadWrite.All Graph application permission.
  # =================================================================================
  - stage: DeployDefenderDetections
    displayName: "Deploy Defender XDR Custom Detections"
    dependsOn:
      - CheckInfrastructure
      - DeployInfrastructure
      - DeployContentHub
      - DeployCustomContent
    condition: |
      and(
        eq('${{ parameters.deployDefenderDetections }}', 'True'),
        or(
          eq('${{ parameters.deployCustomContent }}', 'False'),
          in(dependencies.DeployCustomContent.result, 'Succeeded', 'Skipped')
        )
      )
    jobs:
      - job: DeployDefenderRules
        displayName: "Deploy Custom Detection Rules to Defender XDR"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 30
        steps:
          - checkout: self

          - task: PowerShell@2
            displayName: "Install powershell-yaml Module"
            inputs:
              targetType: "inline"
              pwsh: true
              script: |
                Write-Host "##[section]Installing powershell-yaml module"
                Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber
                Write-Host "powershell-yaml installed successfully."

          - task: AzurePowerShell@5
            displayName: "Deploy Defender Custom Detections"
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: "InlineScript"
              Inline: |
                $scriptParams = @{
                    BasePath = "$(Build.SourcesDirectory)"
                }

                if ("$(flagWhatIf)") { $scriptParams['WhatIf'] = $true }

                Write-Host "##[section]Launching Defender XDR Custom Detections Deployment"

                & "$(Build.SourcesDirectory)/Scripts/Deploy-DefenderDetections.ps1" @scriptParams
              azurePowerShellVersion: "LatestVersion"
              pwsh: true
              errorActionPreference: "Continue"
